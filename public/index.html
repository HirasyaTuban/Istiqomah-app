      const saveUserToFirestore = async (submissionId, additionalData = {}) => {
        try {
          const userRef = getUserDoc(submissionId);
          const userSnap = await getDoc(userRef);

          const now = new Date().toISOString();

          if (userSnap.exists()) {
            // User sudah ada, update lastLoginAt dan loginCount
            const existingData = userSnap.data();
            await setDoc(userRef, {
              ...existingData,
              lastLoginAt: now,
              loginCount: (existingData.loginCount || 0) + 1,
              ...additionalData
            }, { merge: true });
            console.log('User updated:', submissionId);
            return { isNewUser: false, data: { ...existingData, lastLoginAt: now } };
          } else {
            // User baru, buat dokumen baru
            const newUserData = {
              submissionId: submissionId,
              createdAt: now,
              firstLoginAt: now,
              lastLoginAt: now,
              loginCount: 1,
              status: 'active',
              ...additionalData
            };
            await setDoc(userRef, newUserData);
            console.log('New user created:', submissionId);
            return { isNewUser: true, data: newUserData };
          }

          console.error('Error saving user to Firestore:', error);
          throw error;
        }

      // --- App Component ---
      function App() {
        const [user, setUser] = useState(null);
        const [loading, setLoading] = useState(true);
        const [accessCode, setAccessCode] = useState('');
        const [activeTab, setActiveTab] = useState('challenge');
        const [showInstall, setShowInstall] = useState(false);

        useEffect(() => {
          const savedCode = localStorage.getItem('ramadhan_access_code');
          if (savedCode) {
            setAccessCode(savedCode);
          }

          const initAuth = async (retryCount = 0) => {
            try {
              if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
                console.log('[Auth] Signed in with custom token');
              } else {
                await signInAnonymously(auth);
                console.log('[Auth] Signed in anonymously');
              }
            } catch (error) {
              console.error(`[Auth] Error (attempt ${retryCount + 1}):`, error.code, error.message);
              // Retry up to 3 times with exponential backoff
              if (retryCount < 3) {
                const delay = Math.pow(2, retryCount) * 1000;
                console.log(`[Auth] Retrying in ${delay}ms...`);
                setTimeout(() => initAuth(retryCount + 1), delay);
              } else {
                console.error('[Auth] All retry attempts failed. Data will NOT be saved.');
                setLoading(false);
              }
            }
          };
          initAuth();

          const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
            if (currentUser) {
              console.log('[Auth] User authenticated, UID:', currentUser.uid);
            } else {
              console.warn('[Auth] No user - data operations will fail!');
            }
            setUser(currentUser);
            setLoading(false);
          });
          return () => unsubscribe();
        }, []);

        const handleLoginSuccess = async (code, userData = {}) => {
          try {
            // Simpan user ke Firestore
            await saveUserToFirestore(code, userData);

            // Simpan ke localStorage
            localStorage.setItem('ramadhan_access_code', code);
            setAccessCode(code);
          } catch (error) {
            console.error('Error during login:', error);
            // Tetap lanjutkan login meskipun gagal simpan ke Firestore
            localStorage.setItem('ramadhan_access_code', code);
            setAccessCode(code);
          }
        };

        const handleLogout = () => {
          localStorage.removeItem('ramadhan_access_code');

        const handleVerify = async (e) => {
          e.preventDefault();
          if (!submissionId.trim()) return;

          const trimmedId = submissionId.trim();

          // Bypass untuk admin/testing
          if (trimmedId === 'pompy') {
            onSuccess(trimmedId, { role: 'admin' });
            return;
          }

          setIsVerifying(true);
          setErrorMsg('');

          try {
            const apiSources = [
              'https://resetramadhanmu.dripform.id',
              'https://tarbiyahramadhan.dripform.id',
              'https://ramadhan-reset.dripform.id',
              'https://ramadhanreset.dripform.id',
              'https://boost.dripform.id',
              'https://ramadhansahabat.dripform.id',
              'https://madrasahkeluarga.id/ramadhan',
              'https://riayahdigital.dripform.id',
              'https://giatramadhan.dripform.id',
              'https://klikdi.dripform.id',
              'https://ramadhanterbaikmu.dripform.id',
              'https://resetramadhan.dripform.id',
              'https://autoreset.dripform.id',
              'https://ramadhanpro.dripform.id',
              'https://spirit.dripform.id',
              'https://resetramadhannew.dripform.id',
              'https://ramadhan1447h.dripform.id',
              'https://pengusahamuslim.id',
              'https://ramadhandaily.dripform.id',
              'https://ramadhankoo.dripform.id',
              'https://romadhonmubarok.dripform.id',
              'https://themazdha.dripform.id'

            ];

            // Helper: fetch with timeout (8 detik per request)
            const fetchWithTimeout = async (url, timeoutMs = 8000) => {
              const controller = new AbortController();
              const timer = setTimeout(() => controller.abort(), timeoutMs);
              try {
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(timer);
                return response;
              } catch (err) {
                clearTimeout(timer);
                throw err;
              }
            };

            // Check satu source dan return hasilnya
            const checkSource = async (source) => {
              try {
                const url = `${source}/api/check-submission?id=${encodeURIComponent(trimmedId)}`;
                const response = await fetchWithTimeout(url);
                const data = await response.json();
                return { source, data, error: null };
              } catch (err) {
                console.warn(`Gagal cek di ${source}:`, err.name === 'AbortError' ? 'Timeout' : err.message);
                return { source, data: null, error: err };
              }
            };

            // Jalankan SEMUA API calls secara PARALLEL
            const results = await Promise.allSettled(apiSources.map(s => checkSource(s)));

            let verifiedData = null;
            let failureStatus = null;
            let successCount = 0;
            let errorCount = 0;

            for (const result of results) {
              if (result.status === 'rejected' || !result.value) continue;
              const { data, error } = result.value;

              if (error || !data) {
                errorCount++;
                continue;
              }

              successCount++;

              if (!data.error && data.status === 'Purchase') {
                verifiedData = data;
                break; // Ditemukan, tidak perlu cek lainnya
              } else if (data.status && !failureStatus) {
                failureStatus = data.status;
              }
            }

            console.log(`API Check: ${successCount} berhasil, ${errorCount} gagal dari ${apiSources.length} sumber`);

            if (verifiedData) {
              const userData = {
                paymentStatus: verifiedData.status,
                verifiedAt: new Date().toISOString(),
                ...(verifiedData.email && { email: verifiedData.email }),
                ...(verifiedData.name && { name: verifiedData.name }),
                ...(verifiedData.phone && { phone: verifiedData.phone })
              };
              onSuccess(trimmedId, userData);
            } else {
              if (successCount === 0 && errorCount > 0) {
                setErrorMsg('Tidak dapat terhubung ke server. Periksa koneksi internet Anda dan coba lagi.');
              } else if (failureStatus) {
                setErrorMsg(`Status pembayaran: ${failureStatus}. Harap selesaikan pembayaran.`);
              } else {
                setErrorMsg('Kode Akses tidak valid atau tidak ditemukan.');
              }
              setIsVerifying(false);
            }
          } catch (err) {
            console.error("Verification Error:", err);
            setErrorMsg('Terjadi kesalahan koneksi. Silakan coba lagi.');
            setIsVerifying(false);
          }
        };

        return (
          <div className="min-h-screen bg-black flex flex-col items-center justify-center p-6 text-center animate-in fade-in zoom-in-95 duration-500">
            <div className="w-full max-w-sm">

                <img src="https://setunggal.dripform.id/d23abffa-a63c-4b22-a35c-e0a7150a70fc.png" alt="Logo Ramadhan Reset" className="w-full h-full object-cover rounded-full" />

              <p className="text-zinc-500 text-sm mb-8">Masukkan Kode Akses Anda untuk memulai perjalanan.</p>

                </div>
                {errorMsg && (<div className="flex items-center gap-2 text-red-500 text-xs text-left bg-red-950/20 p-3 rounded-lg border border-red-900/30"><AlertCircle className="w-4 h-4 flex-shrink-0" /><p>{errorMsg}</p></div>)}

      function GoalTracker({ userId }) {
        const [selectedDate, setSelectedDate] = useState(new Date());
        const dateStr = useMemo(() => selectedDate.toISOString().split('T')[0], [selectedDate]);
        const [goals, setGoals] = useState([]);
        const [tasks, setTasks] = useState([]);
        const [newGoalTitle, setNewGoalTitle] = useState('');
        const [newGoalDeadline, setNewGoalDeadline] = useState('');
        const [isAddingGoal, setIsAddingGoal] = useState(false);
        const [newTaskValues, setNewTaskValues] = useState({});

        useEffect(() => { if (!userId) return; const docRef = getUserDataDoc('ramadhan_goals', userId); const unsubscribe = onSnapshot(docRef, (docSnap) => { if (docSnap.exists()) { setGoals(docSnap.data().list || []); } else { setGoals([]); } }); return () => unsubscribe(); }, [userId]);
        useEffect(() => { if (!userId) return; const docRef = getUserDataDoc('ramadhan_goal_tasks', `${userId}_${dateStr}`); const unsubscribe = onSnapshot(docRef, (docSnap) => { if (docSnap.exists()) { setTasks(docSnap.data().tasks || []); } else { setTasks([]); } }); return () => unsubscribe(); }, [userId, dateStr]);

        const addGoal = async (e) => {
          e.preventDefault();
          if (!newGoalTitle.trim() || !newGoalDeadline) return;
          const newGoal = {
            id: Date.now().toString(),
            title: newGoalTitle.trim(),
            deadline: newGoalDeadline,
            createdAt: new Date().toISOString()
          };
          try {
            const docRef = getUserDataDoc('ramadhan_goals', userId);
            const updatedGoals = [...goals, newGoal];
            await setDoc(docRef, { list: updatedGoals }, { merge: true });
            setNewGoalTitle('');
            setNewGoalDeadline('');
            setIsAddingGoal(false);
          } catch (err) { console.error("Error adding goal:", err); }
        };
        const deleteGoal = async (goalId) => { const updatedGoals = goals.filter(g => g.id !== goalId); try { const docRef = getUserDataDoc('ramadhan_goals', userId); await setDoc(docRef, { list: updatedGoals }, { merge: true }); } catch (err) { console.error("Error deleting goal:", err); } };
        const addTaskToGoal = async (e, goalId) => { e.preventDefault(); const text = newTaskValues[goalId]; if (!text || !text.trim()) return; const taskItem = { id: Date.now().toString(), text: text.trim(), completed: false, goalId: goalId }; try { const docRef = getUserDataDoc('ramadhan_goal_tasks', `${userId}_${dateStr}`); const updatedTasks = [...tasks, taskItem]; await setDoc(docRef, { tasks: updatedTasks }, { merge: true }); setNewTaskValues(prev => ({ ...prev, [goalId]: '' })); } catch (err) { console.error("Error adding task:", err); } };
        const toggleTask = async (taskId) => { const updatedTasks = tasks.map(t => t.id === taskId ? { ...t, completed: !t.completed } : t); setTasks(updatedTasks); try { const docRef = getUserDataDoc('ramadhan_goal_tasks', `${userId}_${dateStr}`); await setDoc(docRef, { tasks: updatedTasks }, { merge: true }); } catch (err) { console.error("Error updating task:", err); } };
        const deleteTask = async (taskId) => { const updatedTasks = tasks.filter(t => t.id !== taskId); setTasks(updatedTasks); try { const docRef = getUserDataDoc('ramadhan_goal_tasks', `${userId}_${dateStr}`); await setDoc(docRef, { tasks: updatedTasks }, { merge: true }); } catch (err) { console.error("Error deleting task:", err); } };
        const changeDate = (days) => { const newDate = new Date(selectedDate); newDate.setDate(selectedDate.getDate() + days); setSelectedDate(newDate); };
        const handleTaskInputChange = (goalId, value) => { setNewTaskValues(prev => ({ ...prev, [goalId]: value })); };

        // Helper untuk menghitung sisa hari
        const getDaysRemaining = (deadline) => {
          if (!deadline) return null;
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const targetDate = new Date(deadline);
          targetDate.setHours(0, 0, 0, 0);
          const diffTime = targetDate - today;
          const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
          return diffDays;
        };

        // Helper untuk menghitung progress berdasarkan waktu
        const getTimeProgress = (createdAt, deadline) => {
          if (!deadline || !createdAt) return 0;
          const start = new Date(createdAt);
          const end = new Date(deadline);
          const now = new Date();
          const totalDuration = end - start;
          const elapsed = now - start;
          if (totalDuration <= 0) return 100;
          const progress = Math.round((elapsed / totalDuration) * 100);
          return Math.min(100, Math.max(0, progress));
        };

        // Format tanggal untuk display
        const formatDeadline = (deadline) => {
          if (!deadline) return '';
          return new Date(deadline).toLocaleDateString('id-ID', {
            day: 'numeric',
            month: 'short',
            year: 'numeric'
          });
        };

        // Get status badge color based on days remaining
        const getDeadlineStatus = (daysRemaining) => {
          if (daysRemaining === null) return { color: 'text-zinc-500 bg-zinc-800 border-zinc-700', label: 'Tanpa Deadline' };
          if (daysRemaining < 0) return { color: 'text-red-400 bg-red-950/30 border-red-500/30', label: 'Terlewat' };
          if (daysRemaining === 0) return { color: 'text-orange-400 bg-orange-950/30 border-orange-500/30', label: 'Hari Ini!' };
          if (daysRemaining <= 3) return { color: 'text-yellow-400 bg-yellow-950/30 border-yellow-500/30', label: `${daysRemaining} Hari Lagi` };
          if (daysRemaining <= 7) return { color: 'text-blue-400 bg-blue-950/30 border-blue-500/30', label: `${daysRemaining} Hari Lagi` };
          return { color: 'text-emerald-400 bg-emerald-950/30 border-emerald-500/30', label: `${daysRemaining} Hari Lagi` };
        };

        return (
          <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500 pb-20">
            <div className="flex items-center justify-between bg-zinc-900 p-4 rounded-2xl border border-zinc-800">

            <div className="flex items-center justify-between px-2"><div className="flex items-center gap-2"><Target className="w-5 h-5 text-amber-500" /><h2 className="text-lg font-bold text-white">GOALS Anda</h2></div><button onClick={() => setIsAddingGoal(!isAddingGoal)} className="flex items-center gap-1 text-xs font-bold bg-zinc-800 text-zinc-300 px-3 py-1.5 rounded-lg border border-zinc-700 hover:border-amber-500 hover:text-amber-500 transition-all"><Plus className="w-3 h-3" /> Tambah Goal</button></div>

            {isAddingGoal && (
              <form onSubmit={addGoal} className="bg-zinc-900 p-5 rounded-xl border border-amber-500/50 animate-in slide-in-from-top-2 space-y-4">
                <div>
                  <label className="block text-xs font-bold text-zinc-400 uppercase mb-2">🎯 Goal Baru (Apa yang ingin dicapai?)</label>
                  <input
                    type="text"
                    value={newGoalTitle}
                    onChange={(e) => setNewGoalTitle(e.target.value)}

                    autoFocus
                  />
                </div>
                <div>
                  <label className="block text-xs font-bold text-zinc-400 uppercase mb-2">📅 Target Tanggal Achieve</label>
                  <input
                    type="date"
                    value={newGoalDeadline}
                    onChange={(e) => setNewGoalDeadline(e.target.value)}

                <div className="flex gap-2 pt-2">
                  <button

                    Batal

                  <button

              </form>
            )}

            {goals.length === 0 && !isAddingGoal && (<div className="text-center py-10 border border-dashed border-zinc-800 rounded-2xl bg-zinc-900/30"><Target className="w-10 h-10 text-zinc-700 mx-auto mb-3" /><p className="text-zinc-500 text-sm font-medium">Belum ada Goal yang diset.</p><p className="text-xs text-zinc-600 mt-1">Tentukan tujuan besarmu sekarang.</p></div>)}

            <div className="space-y-6">
              {goals.map((goal) => {
                const goalTasks = tasks.filter(t => t.goalId === goal.id);
                const completedCount = goalTasks.filter(t => t.completed).length;
                const totalCount = goalTasks.length;
                const taskProgress = totalCount === 0 ? 0 : Math.round((completedCount / totalCount) * 100);
                const daysRemaining = getDaysRemaining(goal.deadline);
                const timeProgress = getTimeProgress(goal.createdAt, goal.deadline);
                const deadlineStatus = getDeadlineStatus(daysRemaining);

                return (
                  <div key={goal.id} className="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden shadow-lg relative">
                    {/* Header dengan Deadline Info */}
                    <div className="p-5 border-b border-zinc-800 bg-gradient-to-r from-zinc-900 to-zinc-900 relative">
                      <div className="flex justify-between items-start mb-3">
                        <h3 className="text-xl font-bold text-white leading-tight flex-1 pr-2">{goal.title}</h3>
                        <button onClick={() => { if (window.confirm('Hapus goal ini beserta riwayatnya?')) deleteGoal(goal.id); }} className="text-zinc-600 hover:text-red-500 transition-colors p-1"><X className="w-4 h-4" /></button>
                      </div>

                      {/* Deadline Badge & Countdown */}
                      <div className="flex flex-wrap items-center gap-2 mb-3">
                        <span className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg border text-xs font-bold ${deadlineStatus.color}`}>
                          {daysRemaining !== null && daysRemaining >= 0 ? (
                            <>
                              <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                              {deadlineStatus.label}
                            </>
                          ) : daysRemaining < 0 ? (
                            <>
                              <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                              {deadlineStatus.label}
                            </>
                          ) : deadlineStatus.label}
                        </span>
                        {goal.deadline && (
                          <span className="text-xs text-zinc-500 font-mono">
                            Target: {formatDeadline(goal.deadline)}
                          </span>
                        )}
                      </div>

                      {/* Progress Bars */}
                      <div className="space-y-2">
                        {/* Time Progress */}
                        {goal.deadline && (
                          <div className="flex items-center gap-2">
                            <span className="text-[10px] text-zinc-500 uppercase w-16">Waktu</span>
                            <div className="flex-1 h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                              <div
                                className={`h-full transition-all duration-500 ${timeProgress >= 100 ? 'bg-red-500' : timeProgress >= 75 ? 'bg-orange-500' : 'bg-blue-500'}`}
                                style={{ width: `${timeProgress}%` }}
                              />
                            </div>
                            <span className="text-[10px] font-mono text-zinc-500 w-10 text-right">{timeProgress}%</span>
                          </div>
                        )}
                        {/* Task Progress */}
                        <div className="flex items-center gap-2">
                          <span className="text-[10px] text-zinc-500 uppercase w-16">Hari Ini</span>
                          <div className="flex-1 h-1.5 bg-zinc-800 rounded-full overflow-hidden">
                            <div className="h-full bg-amber-500 transition-all duration-500" style={{ width: `${taskProgress}%` }} />
                          </div>
                          <span className="text-[10px] font-mono text-amber-500 w-10 text-right">{taskProgress}%</span>
                        </div>
                      </div>
                    </div>

                    {/* Tasks Section */}
                    <div className="p-4 bg-black/20">
                      <div className="flex items-center gap-2 mb-3">
                        <ListTodo className="w-4 h-4 text-zinc-500" />
                        <span className="text-xs font-bold text-zinc-400 uppercase tracking-wider">Langkah Hari Ini</span>
                        {totalCount > 0 && (
                          <span className="text-xs text-zinc-600 font-mono">({completedCount}/{totalCount})</span>
                        )}
                      </div>

                      <div className="space-y-2">
                        {goalTasks.length === 0 && (
                          <p className="text-xs text-zinc-600 italic py-2">Belum ada langkah untuk hari ini. Tambahkan di bawah!</p>
                        )}
                        {goalTasks.map(task => (
                          <div key={task.id} className="group flex items-center gap-3 p-3 rounded-xl hover:bg-zinc-800/50 transition-colors border border-transparent hover:border-zinc-800">
                            <button onClick={() => toggleTask(task.id)} className={`flex-shrink-0 w-5 h-5 rounded border flex items-center justify-center transition-all ${task.completed ? 'bg-emerald-500 border-emerald-500 text-black' : 'bg-transparent border-zinc-600 text-transparent hover:border-zinc-400'}`}>
                              <CheckSquare className="w-3.5 h-3.5" />
                            </button>
                            <span className={`flex-1 text-sm font-medium transition-all ${task.completed ? 'text-zinc-600 line-through' : 'text-zinc-300'}`}>{task.text}</span>
                            <button onClick={() => deleteTask(task.id)} className="text-zinc-700 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                              <Trash2 className="w-4 h-4" />
                            </button>
                          </div>
                        ))}
                      </div>

                      <form onSubmit={(e) => addTaskToGoal(e, goal.id)} className="mt-4 flex gap-2">
                        <input
                          type="text"
                          value={newTaskValues[goal.id] || ''}
                          onChange={(e) => handleTaskInputChange(goal.id, e.target.value)}
                          placeholder="Tambah langkah kecil hari ini..."
                          className="flex-1 bg-zinc-800/50 border border-zinc-800 rounded-lg px-3 py-2 text-xs text-white focus:ring-1 focus:ring-amber-500 focus:border-amber-500 focus:outline-none placeholder:text-zinc-600"
                        />
                        <button
                          type="submit"
                          disabled={!newTaskValues[goal.id]?.trim()}
                          className="bg-zinc-800 text-zinc-400 p-2 rounded-lg hover:bg-zinc-700 hover:text-white disabled:opacity-50 transition-colors"
                        >
                          <Plus className="w-4 h-4" />
                        </button>
                      </form>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      function QuranTracker({ userId }) {
        const [globalStats, setGlobalStats] = useState({ currentPage: 0, totalPages: 604, khatamCount: 0 });
        const [dailySettings, setDailySettings] = useState({ targetPages: 20 });
        const [todayStartPage, setTodayStartPage] = useState(null);
        const [isEditingTarget, setIsEditingTarget] = useState(false);
        const [loading, setLoading] = useState(false);
        const todayStr = new Date().toISOString().split('T')[0];

        useEffect(() => { if (!userId) return; const unsubGlobal = onSnapshot(getUserDataDoc('ramadhan_quran_progress', userId), (s) => { if (s.exists()) setGlobalStats(prev => ({ ...prev, ...s.data() })); }); const unsubSettings = onSnapshot(getUserDataDoc('ramadhan_quran_settings', userId), (s) => { if (s.exists()) setDailySettings(prev => ({ ...prev, ...s.data() })); }); return () => { unsubGlobal(); unsubSettings(); }; }, [userId]);
        useEffect(() => { if (!userId) return; const todayLogRef = getUserDataDoc('ramadhan_daily_logs', `${userId}_${todayStr}`); const unsubToday = onSnapshot(todayLogRef, async (s) => { if (s.exists() && s.data().quranStartPage !== undefined) { setTodayStartPage(s.data().quranStartPage); } else if (globalStats.currentPage !== undefined) { await setDoc(todayLogRef, { quranStartPage: globalStats.currentPage }, { merge: true }); } }); return () => unsubToday(); }, [userId, todayStr, globalStats.currentPage]);

        const updatePage = async (newPage) => { if (!userId) return; const validPage = Math.max(0, Math.min(newPage, globalStats.totalPages)); setLoading(true); try { await setDoc(getUserDataDoc('ramadhan_quran_progress', userId), { currentPage: validPage }, { merge: true }); } finally { setLoading(false); } };
        const saveTarget = async (newTarget) => { if (!userId) return; await setDoc(getUserDataDoc('ramadhan_quran_settings', userId), { targetPages: parseInt(newTarget) || 20 }, { merge: true }); setIsEditingTarget(false); };
        const startPage = todayStartPage ?? globalStats.currentPage;
        const pagesReadToday = Math.max(0, globalStats.currentPage - startPage);
        const dailyPercent = Math.min(100, Math.round((pagesReadToday / dailySettings.targetPages) * 100));
        const globalPercent = Math.round((globalStats.currentPage / globalStats.totalPages) * 100);

        return (
          <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div className="flex items-center justify-between pt-2">
              <div className="flex items-center gap-4"><div className="inline-flex items-center justify-center w-10 h-10 bg-zinc-900 border border-zinc-800 rounded-full text-amber-500"><BookOpen className="w-5 h-5" /></div><div><h2 className="text-lg font-bold text-white">Target Harian</h2><p className="text-xs text-zinc-500 font-mono uppercase">{dailySettings.targetPages} HALAMAN / HARI</p></div></div>
              <button onClick={() => setIsEditingTarget(!isEditingTarget)} className="p-2 bg-zinc-900 border border-zinc-800 text-zinc-400 rounded-full hover:bg-zinc-800 hover:text-amber-500 transition-colors">{isEditingTarget ? <X className="w-5 h-5" /> : <Settings className="w-5 h-5" />}</button>
            </div>
            {isEditingTarget && (<div className="bg-zinc-900 p-4 rounded-xl border border-zinc-800 animate-in slide-in-from-top-2"><label className="block text-xs font-bold text-zinc-400 uppercase mb-3">Set Target (Halaman)</label><div className="flex gap-2"><input type="number" defaultValue={dailySettings.targetPages} className="flex-1 bg-black border border-zinc-700 rounded-lg px-3 py-2 text-sm text-white focus:ring-1 focus:ring-amber-500 focus:outline-none" id="targetInput" /><button onClick={() => saveTarget(document.getElementById('targetInput').value)} className="bg-amber-500 text-black px-4 py-2 rounded-lg text-sm font-bold hover:bg-amber-400">SIMPAN</button></div></div>)}
            <div className="bg-zinc-900 p-8 rounded-3xl border border-zinc-800 text-center relative overflow-hidden">
              <div className="flex justify-center mb-6"><div className="relative w-52 h-52"><div className="w-full h-full rounded-full flex items-center justify-center bg-black shadow-2xl" style={{ background: `conic-gradient(#f59e0b ${dailyPercent}%, #09090b 0)` }}><div className="w-48 h-48 bg-zinc-900 rounded-full flex flex-col items-center justify-center border border-zinc-800 shadow-inner"><span className="text-6xl font-bold text-white tracking-tighter">{dailyPercent}%</span><div className="flex flex-col items-center mt-2 space-y-1"><span className="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">Hari Ini</span><span className="text-sm font-medium text-amber-500">{pagesReadToday} <span className="text-zinc-600">/ {dailySettings.targetPages}</span></span></div></div></div></div></div>
              <div className="inline-flex items-center gap-2 bg-black border border-zinc-800 px-4 py-2 rounded-full"><div className="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></div><span className="text-xs text-zinc-400 font-mono uppercase">MULAI DARI HAL {startPage}</span></div>
            </div>
            <div className="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
              <label className="flex justify-between items-center mb-6 border-b border-zinc-800 pb-4"><span className="text-sm font-bold text-zinc-400 uppercase tracking-wider">Posisi Bacaan</span><span className="text-white font-mono text-lg text-amber-500">HAL. {globalStats.currentPage}</span></label>
              <div className="flex gap-4 mb-4"><button disabled={loading || globalStats.currentPage <= 0} onClick={() => updatePage(globalStats.currentPage - 1)} className="w-14 h-14 flex items-center justify-center rounded-2xl bg-black border border-zinc-800 hover:border-amber-500/50 text-zinc-400 hover:text-amber-500 transition-all"><ChevronLeft className="w-6 h-6" /></button><div className="flex-1 relative"><input type="number" value={globalStats.currentPage} onChange={(e) => updatePage(parseInt(e.target.value) || 0)} className="w-full h-14 text-center text-2xl font-bold bg-black border border-zinc-800 rounded-2xl text-white focus:border-amber-500 focus:ring-1 focus:ring-amber-500 focus:outline-none" /></div><button disabled={loading || globalStats.currentPage >= globalStats.totalPages} onClick={() => updatePage(globalStats.currentPage + 1)} className="w-14 h-14 flex items-center justify-center rounded-2xl bg-amber-500 text-black hover:bg-amber-400 transition-colors shadow-lg shadow-amber-500/20"><ChevronRight className="w-6 h-6" /></button></div>
              <div className="grid grid-cols-2 gap-3"><button onClick={() => updatePage(globalStats.currentPage + 10)} className="py-4 text-xs font-bold text-zinc-400 bg-black border border-zinc-800 rounded-xl hover:border-amber-500/50 hover:text-amber-500 transition-all uppercase tracking-wider">+10 Halaman</button><button onClick={() => updatePage(globalStats.currentPage + 20)} className="py-4 text-xs font-bold text-zinc-400 bg-black border border-zinc-800 rounded-xl hover:border-amber-500/50 hover:text-amber-500 transition-all uppercase tracking-wider">+1 Juz (20 Hal)</button></div>
            </div>
            <div className="bg-black border border-zinc-800 p-5 rounded-2xl flex items-center justify-between"><div className="flex items-center gap-3"><TrendingUp className="w-4 h-4 text-amber-500" /><span className="text-xs font-bold text-zinc-400 uppercase tracking-widest">Total Khatam</span></div><div className="flex items-center gap-4"><div className="w-24 h-1.5 bg-zinc-800 rounded-full overflow-hidden"><div className="bg-amber-500 h-full shadow-[0_0_8px_rgba(245,158,11,0.5)]" style={{ width: `${globalPercent}%` }}></div></div><span className="font-mono text-sm text-white">{globalPercent}%</span></div></div>
          </div>
        );
      }

      function PrayerBox({ userId }) {
        const [activeTab, setActiveTab] = useState('matsurat');
        const [matsuratTime, setMatsuratTime] = useState('pagi');
        const [showLatin, setShowLatin] = useState(true);
        const [showTerjemah, setShowTerjemah] = useState(true);
        const [newPrayer, setNewPrayer] = useState('');
        const [myPrayers, setMyPrayers] = useState([]);

        useEffect(() => { if (!userId) return; const docRef = getUserDataDoc('ramadhan_prayers', userId); return onSnapshot(docRef, (docSnap) => { if (docSnap.exists()) { setMyPrayers(docSnap.data().list || []); } else { setMyPrayers([]); } }); }, [userId]);
        const addPrayer = async (e) => { e.preventDefault(); if (!newPrayer.trim()) return; try { const docRef = getUserDataDoc('ramadhan_prayers', userId); const docSnap = await getDoc(docRef); let currentList = docSnap.exists() ? docSnap.data().list || [] : []; const newEntry = { id: Date.now().toString(), content: newPrayer, createdAt: new Date().toISOString() }; currentList.push(newEntry); await setDoc(docRef, { list: currentList }, { merge: true }); setNewPrayer(''); } catch (err) { console.error(err); } };
        const deletePrayer = async (id) => { try { const docRef = getUserDataDoc('ramadhan_prayers', userId); const docSnap = await getDoc(docRef); if (docSnap.exists()) { let currentList = docSnap.data().list || []; const newList = currentList.filter(p => p.id !== id); await setDoc(docRef, { list: newList }); } } catch (err) { console.error(err); } };
        const currentMatsurat = MATSURAT_PAGI;

        return (
          <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500 pb-20">
            <div className="flex bg-zinc-900 p-1 rounded-xl border border-zinc-800"><button onClick={() => setActiveTab('matsurat')} className={`flex-1 py-2 text-xs font-bold uppercase tracking-wider rounded-lg transition-all ${activeTab === 'matsurat' ? 'bg-amber-500 text-black shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>Doa Ma'tsurat</button><button onClick={() => setActiveTab('pribadi')} className={`flex-1 py-2 text-xs font-bold uppercase tracking-wider rounded-lg transition-all ${activeTab === 'pribadi' ? 'bg-amber-500 text-black shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>Doa Pribadi</button></div>
            {activeTab === 'matsurat' ? (
              <div className="space-y-4">
                <div className="flex justify-between items-center gap-2 mb-2">
                  <div className="flex gap-2"><button onClick={() => setMatsuratTime('pagi')} className={`flex items-center gap-2 px-3 py-1.5 rounded-lg border text-xs font-bold transition-all ${matsuratTime === 'pagi' ? 'bg-amber-500/10 border-amber-500 text-amber-500' : 'bg-zinc-900 border-zinc-800 text-zinc-500'}`}><Sun className="w-3 h-3" /> Pagi</button><button onClick={() => setMatsuratTime('sore')} className={`flex items-center gap-2 px-3 py-1.5 rounded-lg border text-xs font-bold transition-all ${matsuratTime === 'sore' ? 'bg-indigo-500/10 border-indigo-500 text-indigo-400' : 'bg-zinc-900 border-zinc-800 text-zinc-500'}`}><Sunset className="w-3 h-3" /> Sore</button></div>
                  <div className="flex gap-2"><button onClick={() => setShowLatin(!showLatin)} className={`p-1.5 rounded-lg border transition-all ${showLatin ? 'bg-zinc-800 border-zinc-600 text-white' : 'bg-transparent border-zinc-800 text-zinc-600'}`} title="Toggle Latin"><Type className="w-4 h-4" /></button><button onClick={() => setShowTerjemah(!showTerjemah)} className={`p-1.5 rounded-lg border transition-all ${showTerjemah ? 'bg-zinc-800 border-zinc-600 text-white' : 'bg-transparent border-zinc-800 text-zinc-600'}`} title="Toggle Terjemahan"><Languages className="w-4 h-4" /></button></div>
                </div>
                <div className="space-y-4">
                  {matsuratTime === 'sore' && (<div className="bg-indigo-900/20 border border-indigo-500/30 p-3 rounded-xl text-center"><p className="text-xs text-indigo-300">Tampilan berikut menggunakan teks Ma'tsurat Pagi sebagai referensi. (Konten Sore belum tersedia spesifik)</p></div>)}
                  {currentMatsurat.map((item, idx) => (<MatsuratCard key={idx} item={item} showLatin={showLatin} showTerjemah={showTerjemah} />))}
                </div>
              </div>
            ) : (
              <div className="space-y-4">
                <form onSubmit={addPrayer} className="bg-zinc-900 p-5 rounded-2xl border border-zinc-800"><label className="block text-[10px] font-bold uppercase text-zinc-500 mb-3 tracking-widest">Tambah Doa / Harapan</label><div className="flex gap-2"><input type="text" value={newPrayer} onChange={(e) => setNewPrayer(e.target.value)} placeholder="Tulis harapanmu disini..." className="flex-1 bg-black border border-zinc-700 rounded-lg px-4 py-2 text-sm text-white focus:ring-1 focus:ring-amber-500 focus:outline-none placeholder:text-zinc-700" /><button type="submit" disabled={!newPrayer.trim()} className="bg-amber-500 text-black p-2 rounded-lg hover:bg-amber-400 disabled:opacity-50 transition-colors"><Plus className="w-5 h-5" /></button></div></form>
                <div className="space-y-3">{myPrayers.length === 0 && (<div className="text-center py-12 border border-dashed border-zinc-800 rounded-2xl"><p className="text-zinc-500 font-medium text-sm">Belum ada doa pribadi.</p><p className="text-xs text-zinc-600 mt-1">Langitkan doamu sekarang.</p></div>)}{myPrayers.map((item) => (<div key={item.id} className="bg-black p-4 rounded-xl border border-zinc-800 flex justify-between items-start group hover:border-amber-500/30 transition-all"><p className="text-zinc-300 text-sm font-medium leading-relaxed">{item.content}</p><button onClick={() => deletePrayer(item.id)} className="text-zinc-600 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all ml-3"><Trash2 className="w-4 h-4" /></button></div>))}</div>
              </div>
            )}
          </div>
        );
      }

      function MatsuratCard({ item, showLatin, showTerjemah }) {
        const [count, setCount] = useState(0);
        const isDone = count >= item.target;
        return (
          <div onClick={() => setCount(prev => (prev < item.target ? prev + 1 : prev))} className={`relative p-5 rounded-2xl border transition-all duration-300 cursor-pointer overflow-hidden group select-none ${isDone ? 'bg-emerald-900/20 border-emerald-500/50 shadow-[0_0_15px_rgba(16,185,129,0.1)]' : 'bg-zinc-900 border-zinc-800 hover:border-zinc-700'}`}>
            <div className={`absolute bottom-0 left-0 h-1 transition-all duration-300 ${isDone ? 'bg-emerald-500' : 'bg-amber-500'}`} style={{ width: `${(count / item.target) * 100}%` }} />
            <div className="flex justify-between items-start mb-3"><span className={`text-[10px] font-bold uppercase tracking-widest px-2 py-1 rounded-md border ${isDone ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-zinc-800 text-zinc-500 border-zinc-700'}`}>{item.target}x Bacaan</span><div className={`flex items-center gap-1 text-sm font-mono font-bold ${isDone ? 'text-emerald-400' : 'text-zinc-400'}`}><span>{count}</span><span className="text-zinc-600">/</span><span>{item.target}</span></div></div>
            <h4 className="text-sm font-bold text-white mb-4">{item.title}</h4>
            <p className="text-right font-serif text-2xl leading-loose text-zinc-200 mb-4" dir="rtl">{item.arab}</p>
            {showLatin && (<p className="text-xs text-amber-500/80 mb-2 italic font-medium animate-in fade-in slide-in-from-top-1">{item.latin}</p>)}
            {showTerjemah && (<p className="text-xs text-zinc-500 leading-relaxed border-t border-zinc-800 pt-2 mt-2 animate-in fade-in slide-in-from-top-1">{item.terjemah}</p>)}
            {!isDone && (<div className="absolute inset-0 flex items-center justify-center opacity-0 group-active:opacity-100 transition-opacity bg-black/10"><div className="bg-black/80 text-white text-xs px-3 py-1 rounded-full backdrop-blur-sm">+1</div></div>)}
          </div>
        );
      }

      // --- Mount App ---
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    }

    // Prevent double initialization
    let appStarted = false;
    function safeStartApp() {
      if (appStarted) return;
      appStarted = true;
      console.log('[App] Initializing Ramadhan Reset application...');
      startApp();
    }

    // Initialize when firebase is ready
    window.addEventListener('firebase-ready', safeStartApp);
    // Fallback for strict environments where event might fire before listener
    if (window.FB) safeStartApp();
  </script>

  <!-- Service Worker Registration -->
  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('Service Worker registered successfully:', registration.scope);

            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              console.log('Service Worker update found');

              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // New content available, prompt user to refresh
                  console.log('New content available, please refresh');
                }
              });
            });
          })
          .catch((error) => {
            console.error('Service Worker registration failed:', error);
          });
      });
    }
  </script>
</body>

</html>
